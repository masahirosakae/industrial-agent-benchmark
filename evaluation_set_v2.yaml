version: "2.0"
name: evaluation_set_v2
description: |
  Industrial Agent Benchmark v1.1 の識別力検証用サブセット。
  v1.0 の評価で上位モデル間のスコア差が十分に出なかった課題を踏まえ、
  v1.1 追加カテゴリを中心に、数値制約・判断保留・安全/品質/規制制約・
  structured output・score cap rules を含む問題を 30 問選定する。
selection_policy:
  total_questions: 30
  by_layer:
    industrial_knowledge: 10
    industrial_reasoning: 10
    industrial_agent: 10
  v1_1_focus:
    - maintenance_engineering
    - risk_tradeoff
    - data_integrity
    - agent_safety
    - tool_trajectory
    - hil_boundary
    - structured_decision
  criteria:
    - v1.1追加カテゴリを重点的に含める
    - difficulty 3〜5を含める
    - domainバランスを取る
    - numeric_checks / score_cap_rules / structured_output_requirements を持つ問題を優先
    - generic answer では高得点にならない問題を優先
    - Safe Deferral / HIL / Tool Trajectory / Structured Decision の識別力を検証できる問題を優先
summary:
  difficulty_distribution:
    difficulty_3: 5
    difficulty_4: 18
    difficulty_5: 7
  layer_distribution:
    industrial_knowledge: 10
    industrial_reasoning: 10
    industrial_agent: 10
  domain_distribution:
    automotive: 7
    electronics: 9
    general_manufacturing: 8
    heavy_machinery: 4
    medical_device: 2
  category_distribution:
    maintenance_engineering: 8
    order: 1
    shipping: 1
    risk_tradeoff: 5
    data_integrity: 5
    agent_safety: 2
    tool_trajectory: 2
    hil_boundary: 3
    structured_decision: 3
questions:
  # Knowledge: v1.1 Maintenance & Engineering (10)
  - id: IK-MAINT-001
    layer: industrial_knowledge
    category: maintenance_engineering
    domain: general_manufacturing
    difficulty: 3
    rationale: v1.1 Knowledge追加カテゴリの代表。保全判断で数値条件を使えるかを評価し、v1.0の用語説明型回答との差分を見る。
  - id: IK-MAINT-002
    layer: industrial_knowledge
    category: maintenance_engineering
    domain: electronics
    difficulty: 4
    rationale: 電子機器領域の保全・品質・停止制約を扱い、genericな予防保全論ではなくscenario-specificな判断を要求する。
  - id: IK-MAINT-003
    layer: industrial_knowledge
    category: maintenance_engineering
    domain: general_manufacturing
    difficulty: 3
    rationale: MTBF/MTTRやチョコ停などの定量保全知識を使う基礎〜中難度問題として含める。
  - id: IK-MAINT-004
    layer: industrial_knowledge
    category: maintenance_engineering
    domain: automotive
    difficulty: 4
    rationale: 自動車ドメインで設備停止・品質保証・納期制約を統合する知識を評価できる。
  - id: IK-MAINT-005
    layer: industrial_knowledge
    category: maintenance_engineering
    domain: general_manufacturing
    difficulty: 4
    rationale: 予備品・停止損失・保全計画のトレードオフを含み、数値根拠の有無で差が出る。
  - id: IK-MAINT-006
    layer: industrial_knowledge
    category: maintenance_engineering
    domain: heavy_machinery
    difficulty: 3
    rationale: 重機械設備の異常兆候に対する基本的な保全判断と安全制約を評価する。
  - id: IK-MAINT-007
    layer: industrial_knowledge
    category: maintenance_engineering
    domain: automotive
    difficulty: 4
    rationale: 自動車領域で復旧後品質確認と生産再開判断を扱い、安易な再開判断を検出できる。
  - id: IK-SHIP-005
    layer: industrial_knowledge
    category: shipping
    domain: automotive
    difficulty: 4
    rationale: v1.0からの橋渡し問題。安全部品の記録欠落と出荷停止範囲を扱い、v1.1のData Integrity / HIL評価との比較基準になる。
  - id: IK-MAINT-009
    layer: industrial_knowledge
    category: maintenance_engineering
    domain: general_manufacturing
    difficulty: 5
    rationale: 高難度の保全・品質・安全・コスト統合判断で上位モデル差分を検出する。
  - id: IK-ORDER-004
    layer: industrial_knowledge
    category: order
    domain: medical_device
    difficulty: 3
    rationale: v1.0からの橋渡し問題。医療機器ドメインの試作から量産移管・品質保証制約を含み、v1.1の規制/品質系問題との比較基準になる.

  # Reasoning: Risk Tradeoff / Data Integrity (10)
  - id: IR-RT-001
    layer: industrial_reasoning
    category: risk_tradeoff
    domain: electronics
    difficulty: 4
    rationale: 品質 vs 納期の代表問題。tradeoff_matrix、numeric_basis、go/hold条件を検証できる。
  - id: IR-RT-003
    layer: industrial_reasoning
    category: risk_tradeoff
    domain: heavy_machinery
    difficulty: 4
    rationale: 安全 vs 生産継続を扱い、安全停止をコスト理由で否定するモデルを低スコア化できる。
  - id: IR-RT-004
    layer: industrial_reasoning
    category: risk_tradeoff
    domain: automotive
    difficulty: 5
    rationale: 顧客要求Cpkと工程能力不足の高難度判断で、顧客承認と数値推論の両方を評価する。
  - id: IR-RT-007
    layer: industrial_reasoning
    category: risk_tradeoff
    domain: electronics
    difficulty: 4
    rationale: 環境規制 vs 生産継続を扱い、規制証跡欠落を納期で覆す回答を検出する。
  - id: IR-RT-009
    layer: industrial_reasoning
    category: risk_tradeoff
    domain: general_manufacturing
    difficulty: 3
    rationale: コスト削減案の品質・納期・安全影響を比較する中難度Risk Tradeoff問題。difficulty 3の推論アンカーとして、上位/中位モデルの基本的なKPI比較力を測る。
  - id: IR-DI-001
    layer: industrial_reasoning
    category: data_integrity
    domain: electronics
    difficulty: 4
    rationale: 検査データ欠損と出荷判断の代表問題。欠損を無視した出荷可判断をcriticalに検出する。
  - id: IR-DI-002
    layer: industrial_reasoning
    category: data_integrity
    domain: general_manufacturing
    difficulty: 4
    rationale: MES/QMS/ERP不整合を扱い、システム間矛盾へのSafe Deferral能力を評価する。
  - id: IR-DI-005
    layer: industrial_reasoning
    category: data_integrity
    domain: medical_device
    difficulty: 4
    rationale: 単位不一致の検出と変換を要求し、単位変換ミスや単一ソース過信を検出できる。
  - id: IR-DI-008
    layer: industrial_reasoning
    category: data_integrity
    domain: electronics
    difficulty: 4
    rationale: データ鮮度不足と需給判断を扱い、古い在庫/能力データへの過信を減点できる。
  - id: IR-DI-010
    layer: industrial_reasoning
    category: data_integrity
    domain: automotive
    difficulty: 5
    rationale: n=8のサンプル不足で工程安定を断定する誤りを検出する高難度Safe Deferral問題。

  # Agent: Agent Safety / Tool Trajectory / HIL Boundary / Structured Decision (10)
  - id: IA-AS-001
    layer: industrial_agent
    category: agent_safety
    domain: electronics
    difficulty: 4
    rationale: 欠損データ時の自動OK防止を評価し、危険な自動承認をcritical_failureとして検出できる。
  - id: IA-AS-003
    layer: industrial_agent
    category: agent_safety
    domain: general_manufacturing
    difficulty: 5
    rationale: 保全・安全系のAgent判断境界を評価し、HILなしの危険実行を低スコア化する。
  - id: IA-TT-001
    layer: industrial_agent
    category: tool_trajectory
    domain: electronics
    difficulty: 4
    rationale: ERP/MES/QMS/SOPをまたぐtool順序とapproval gateを評価し、順序誤りを検出する。
  - id: IA-TT-004
    layer: industrial_agent
    category: tool_trajectory
    domain: general_manufacturing
    difficulty: 5
    rationale: 部分失敗時のtool trajectory、rollback/fallback、停止条件を評価する高難度問題。
  - id: IA-HILB-001
    layer: industrial_agent
    category: hil_boundary
    domain: electronics
    difficulty: 4
    rationale: 出荷判定におけるQA/営業/生産管理のHIL境界とSLAを評価できる。
  - id: IA-HILB-003
    layer: industrial_agent
    category: hil_boundary
    domain: heavy_machinery
    difficulty: 4
    rationale: 設備復旧後の品質確認不完全状態で、誰にいつ承認を求めるかを評価する。
  - id: IA-HILB-005
    layer: industrial_agent
    category: hil_boundary
    domain: automotive
    difficulty: 5
    rationale: 市場不具合初報時の品質・法務・顧客SQE・経営エスカレーションを評価する高難度問題。
  - id: IA-SD-001
    layer: industrial_agent
    category: structured_decision
    domain: electronics
    difficulty: 4
    rationale: 出荷可否判断をdecision/confidence/tradeoff/approvals付きJSONで構造化できるかを評価する。
  - id: IA-SD-003
    layer: industrial_agent
    category: structured_decision
    domain: heavy_machinery
    difficulty: 4
    rationale: 設備停止判断で故障・生産・安全KPIを統合したStructured Decisionを評価する。
  - id: IA-SD-005
    layer: industrial_agent
    category: structured_decision
    domain: automotive
    difficulty: 5
    rationale: 市場不具合封じ込め判断で不具合率・顧客影響・法規制を統合する高難度問題。
