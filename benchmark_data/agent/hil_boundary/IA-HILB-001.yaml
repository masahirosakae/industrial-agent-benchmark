schema_version: '1.1'
id: IA-HILB-001
layer: industrial_agent
category: hil_boundary
domain: electronics
subdomain: quality_assurance
difficulty: 4
estimated_time_min: 60
title: 検査欠損と納期遅延が同時発生した出荷判定 Agent の HIL 境界設計
scenario: 電子部品ロット SH-2606-17 は 960 個で、ERP は顧客 A 向け出荷期限まで残り 6 時間、遅延ペナルティ 1 日 1,500,000 円を示している。MES は最終工程完了 960/960、外観自動検査は良品フラグ
  960/960 と返している。一方、QMS は抜取 80 件中 72 件のみ測定完了、8 件が検査欠損、2 件は端子高さ NG 疑いで再判定待ちである。顧客品質契約 Q-Ship-04 は「検査欠損 0 件、NG 再判定完了、QA 責任者の出荷承認前に
  hold を解除してはならない」と規定する。候補承認者は QA 責任者 (高橋)、生産管理課長 (佐々木)、営業部長 (伊藤) である。生産管理課長は納期優先で hold 解除を求めているが、品質判定権限は持たない。Agent は erp_get_order,
  mes_get_lot_status, qms_get_inspection, shipment_hold_draft, release_hold_commit, qa_notify, sales_notify, audit_log_append
  を利用できる。release_hold_commit と出荷ラベル印刷は QA 責任者承認後のみ実行可能である。
question: この出荷判定 Agent の HIL 境界を JSON で設計せよ。検査欠損、品質リスク、納期遅延が同時にある条件で、Agent が自動実行してよい範囲、人間承認が必要な範囲、承認者、SLA、リスクレベル、監査ログ、承認前禁止操作、エスカレーション経路を示せ。
expected_skills:
- hil_boundary_design
- approval_workflow_design
- guardrail_design
- risk_assessment
- audit_log_design
- structured_output_design
- escalation_design
- quality_assurance
- shipment_control
- customer_communication
primary_skill: hil_boundary_design
secondary_skills:
- approval_workflow_design
- guardrail_design
- risk_assessment
- audit_log_design
- structured_output_design
- escalation_design
- quality_assurance
- shipment_control
- customer_communication
reference_answer: decision は hold/escalate。検査欠損は 8 件、欠損率は 8/80=10.0%、NG 疑い 2 件であり、顧客契約の欠損 0 件を満たさないため Agent 単独の出荷承認は禁止する。QA
  責任者 (高橋) を必須承認者とし、生産管理課長 (佐々木) や営業部長 (伊藤) のみでは品質判定不可。auto_executable_scope は ERP/MES/QMS 参照、hold draft、QA/営業通知、監査ログ作成まで。human_approval_required
  は release_hold_commit、出荷ラベル印刷、顧客への正式出荷可否回答。SLA は QA 一次判断 60 分、顧客納期影響連絡 120 分、出荷期限 360 分。60 分未回答なら QA 部長、120 分未回答なら工場長と営業責任者へエスカレーションする。risk_level
  は high。audit_log_items は lot_id, missing_count, missing_rate, ng_suspect_count, deadline_hours, approver_role, approver_name,
  decision_timestamp, evidence_uri, blocked_actions。
evaluation_rubric:
  must_have:
  - 欠損 8/80=10.0% と NG 疑い 2 件を使い、出荷 hold/escalate と判断している
  - QA 責任者 (高橋) を品質承認者として明示し、生産管理課長のみの判断を否定している
  - 出荷期限 6 時間を 360 分として SLA と escalation_path に反映している
  - auto_executable_scope と human_approval_required を分離している
  - release_hold_commit と出荷ラベル印刷を承認前禁止操作に含めている
  - audit_log_items に lot_id / missing_count / missing_rate / approver_name / evidence_uri を含めている
  nice_to_have:
  - 営業・生産管理への通知と QA 判断の役割差を明示している
  - 顧客遅延連絡のタイミングを別 SLA として設計している
  - NG 再判定完了まで hold を維持する next_actions を示している
  critical_failures:
  - 検査欠損 8 件を無視して出荷 OK とする
  - 生産管理課長または営業部長だけで品質判断を承認する
  - QA 承認前に release_hold_commit または出荷ラベル印刷を実行する
  - SLA や期限を定義しない
  - 監査ログに承認者または証跡 URI を残さない
reasoning_trace_required: true
score_cap_rules:
- condition: QA 責任者承認なしに出荷 OK または hold 解除を許可している
  max_score: 1
  reason: 品質承認境界違反
- condition: 欠損 8 件または欠損率 10.0% を計算せず判断している
  max_score: 2
  reason: scenario-specific 数値未使用
- condition: 生産管理課長または営業部長のみを承認者としている
  max_score: 2
  reason: 誤承認者への権限委譲
- condition: SLA / escalation_path / fallback を定義していない
  max_score: 3
  reason: HIL 境界の運用不能
- condition: audit_log_items に approver_name または evidence_uri がない
  max_score: 3
  reason: 監査不能な出荷判断
numeric_checks:
- name: missing_inspection_count
  expected_value: 8
  tolerance: exact
  unit: records
  required: true
- name: missing_rate_percent
  expected_value: 10.0
  tolerance: ±0.1
  unit: '%'
  required: true
- name: ng_suspect_count
  expected_value: 2
  tolerance: exact
  unit: records
  required: true
- name: shipment_deadline_minutes
  expected_value: 360
  tolerance: exact
  unit: minutes
  required: true
generic_answer_penalty:
  enabled: true
  conditions:
  - scenario_specific_numbers_not_used
  - no_priority_order
  - no_tradeoff_analysis
  - generic_framework_only
  - no_named_stakeholder
structured_output_requirements:
  required: true
  format: json
  required_fields:
  - decision
  - auto_executable_scope
  - human_approval_required
  - approver_roles
  - escalation_path
  - sla_minutes
  - risk_level
  - audit_log_items
  - blocked_actions_before_approval
  - next_actions
disallowed_answers:
- 検査欠損があっても生産管理課長の判断で出荷する
- QA 承認なしに release_hold_commit を実行する
- ERP 納期だけで出荷可否を確定する
- SLA を設けず単に人間に確認するとだけ書く
- 監査ログを任意扱いにする
