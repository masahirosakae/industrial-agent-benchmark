schema_version: '1.1'
id: IA-WD-009
layer: industrial_agent
category: workflow_design
domain: automotive
subdomain: supply_chain_management
difficulty: 3
estimated_time_min: 35
title: サプライヤー逸脱ワークフロー
scenario: |
  サプライヤーが、軽微な寸法逸脱のある部品の出荷を求めている。エージェントはサプライヤー申請データ、図面要求、過去の不良記録、受入検査能力、現在の在庫リスクを読み取ることができる。逸脱レビュー資料をドラフトできる。
question: |
  サプライヤー逸脱申請を扱うためのワークフローを設計せよ。証拠パッケージ作成、レビュールーティング、ブロック行動、最終状態、監査証跡を含めること。
expected_skills:
- workflow_design
- supplier_quality
- material_disposition
- risk_assessment
- audit_log_design
primary_skill: workflow_design
secondary_skills:
- supplier_quality
- material_disposition
- risk_assessment
- audit_log_design
reference_answer: |
  ワークフローでは、サプライヤー逸脱申請と影響部品の詳細を読み取り、逸脱を図面または要求境界と比較し、過去の不良と受入検査の文脈を確認し、部品を受け入れずに在庫および生産リスクを評価する必要がある。
  エージェントは、証拠、提案管理策、影響ロットを含む逸脱レビュー資料をドラフトし、その後、サプライヤー品質または材料審査権限者へ回してよい。
  処置が承認されるまで、受入承認はブロックされたままでなければならない。
  期待される最終状態は supplier_deviation_review_pending である。監査証跡には、サプライヤー申請、証拠、提案管理策、ブロックした受入、承認者ロール、処置状態を含める必要がある。
evaluation_rubric:
  must_have:
  - サプライヤー逸脱申請と影響部品の詳細を読み取っている。
  - 逸脱を図面または要求境界と比較している。
  - 過去の不良と受入検査の文脈を確認している。
  - 部品を受け入れずに在庫および生産リスクを評価している。
  - 証拠、提案管理策、影響ロットを含むレビュー資料をドラフトしている。
  - サプライヤー品質または材料審査権限者へレビューを回している。
  - 処置が承認されるまで受入承認をブロックしている。
  - 最終状態を supplier_deviation_review_pending としている。
  - 申請、証拠、提案管理策、ブロックした受入、承認者ロールを監査している。
  nice_to_have:
  - 購買連絡と品質処置権限を分離している。
  - 受入検査能力を管理策の検討事項として含めている。
  critical_failures:
  - 処置前に逸脱部品を受け入れている。
  - 権限なしに特採使用を決定している。
  - 図面または要求境界を無視している。
  - 品質処置が必要なのに購買だけへ回している。
reasoning_trace_required: true
score_cap_rules:
- condition: ワークフローが処置承認前に逸脱部品を受け入れている。
  max_score: 1
  reason: 禁止された受入承認である。
- condition: ワークフローが図面または要求境界の確認を省略している。
  max_score: 2
  reason: 要求境界は逸脱レビューの中心である。
generic_answer_penalty:
  enabled: true
  conditions:
  - generic_framework_only
  - no_priority_order
  - no_named_stakeholder
structured_output_requirements:
  required: true
  format: json
  required_fields:
  - workflow_steps
  - required_evidence
  - gate_checks
  - allowed_actions
  - blocked_actions
  - escalation_path
  - final_state
  - audit_log_items
disallowed_answers:
- 処置前に逸脱部品を受け入れる。
- 材料審査またはサプライヤー品質権限なしに特採使用を決定する。
- 最終処置を購買だけへ回す。
