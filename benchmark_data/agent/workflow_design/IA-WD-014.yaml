schema_version: '1.1'
id: IA-WD-014
layer: industrial_agent
category: workflow_design
domain: general_manufacturing
subdomain: quality_assurance
difficulty: 5
estimated_time_min: 60
title: 監査対応可能なワークフロー文書化
scenario: |
  部門横断ワークフローにより、工程異常、封じ込め、技術レビュー、一時検査、最終リリースが処理された。エージェントは、利用可能な状態遷移と証拠参照から、監査対応可能なワークフロー記録を準備しなければならない。
question: |
  この事案を監査対応可能にするために必要なワークフロー文書構造を設計せよ。状態遷移、証拠リンク、不足記録確認、最終状態、監査証跡を含めること。
expected_skills:
- workflow_design
- audit_log_design
- evidence_management
- structured_output_design
- traceability_analysis
primary_skill: workflow_design
secondary_skills:
- audit_log_design
- evidence_management
- structured_output_design
- traceability_analysis
reference_answer: |
  ワークフローでは、監査サマリーを書く前にイベントタイムラインと状態遷移を収集する必要がある。各判断は、証拠ソースと責任ロールにリンクされるべきである。
  記録では、管理対象行動、ブロック行動、承認、最終状態を特定する必要がある。封じ込め、レビュー、検査、リリース、連絡の各手順に記録があることを確認する必要がある。
  エージェントは、事案を監査対応可能と宣言する前に、不足証拠または不足承認をフラグしなければならない。ID、タイムスタンプまたは順序マーカー、責任者、証拠参照、判断、行動、残存未完了項目を含む構造化ワークフロー記録を作成する必要がある。
  期待される最終状態は、必要な記録がすべて存在する場合は audit_ready_record_complete、証拠または承認が不足している場合は audit_record_incomplete_missing_evidence である。
evaluation_rubric:
  must_have:
  - 監査サマリーの前にイベントタイムラインと状態遷移を収集している。
  - 各判断を証拠ソースと責任ロールにリンクしている。
  - 管理対象行動、ブロック行動、承認、最終状態を特定している。
  - 封じ込め、レビュー、検査、リリース、連絡の記録を確認している。
  - 監査対応可能と宣言する前に、不足証拠または不足承認をフラグしている。
  - ID、タイムスタンプまたは順序マーカー、責任者、証拠参照、判断、行動、残存未完了項目を含む構造化記録を作成している。
  - 最終状態を audit_ready_record_complete または audit_record_incomplete_missing_evidence としている。
  nice_to_have:
  - 状態遷移に機械確認可能な構造を使っている。
  - 未完了項目と完了済み証拠を分離している。
  critical_failures:
  - 承認または証拠が不足しているのに監査対応可能と宣言している。
  - 証拠参照を捏造している。
  - 状態遷移なしに最終結果だけを要約している。
  - ブロック行動またはエスカレーション履歴を省略している。
reasoning_trace_required: true
score_cap_rules:
- condition: ワークフローが承認または証拠不足のまま監査対応可能と宣言している。
  max_score: 1
  reason: 監査対応可能という最終状態が無効である。
- condition: ワークフローが証拠参照を捏造している。
  max_score: 1
  reason: 捏造された証拠は重大な監査不良である。
- condition: ワークフローが状態遷移を省略している。
  max_score: 2
  reason: ワークフロー文書化には状態遷移のトレーサビリティが必要である。
generic_answer_penalty:
  enabled: true
  conditions:
  - generic_framework_only
  - no_priority_order
  - no_named_stakeholder
structured_output_requirements:
  required: true
  format: json
  required_fields:
  - workflow_steps
  - required_evidence
  - gate_checks
  - allowed_actions
  - blocked_actions
  - escalation_path
  - final_state
  - audit_log_items
disallowed_answers:
- 承認記録が不足していても監査対応可能と宣言する。
- 監査証跡を完成させるために証拠参照を作る。
- ワークフロー状態遷移なしに最終結果だけを提示する。
