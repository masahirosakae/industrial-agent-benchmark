schema_version: '1.1'
id: IA-WD-013
layer: industrial_agent
category: workflow_design
domain: general_manufacturing
subdomain: quality_assurance
difficulty: 3
estimated_time_min: 35
title: 封じ込めとリリースのワークフロー
scenario: |
  異常な工程信号の後、疑わしいロットが封じ込められている。エージェントは工程履歴、検査結果、封じ込め記録、承認状態を読み取ることができる。リリース推奨をドラフトできるが、ロットをリリースすることはできない。
question: |
  封じ込めからリリース準備完了までのワークフローを設計せよ。証拠確認、リリース基準、ブロック行動、承認者ルーティング、最終状態、監査証跡を含めること。
expected_skills:
- workflow_design
- containment_planning
- release_control
- quality_assurance
- audit_log_design
primary_skill: workflow_design
secondary_skills:
- containment_planning
- release_control
- quality_assurance
- audit_log_design
reference_answer: |
  ワークフローでは、リリース評価の前に、封じ込め記録、工程信号、影響ロット、検査状態を読み取る必要がある。必要な検査または再確認が完了しているかを確認し、その後、証拠をリリース基準と比較する必要がある。
  証拠または承認が不足している場合、ロットはブロック状態を維持しなければならない。エージェントは、証拠が完了している場合に限りリリース推奨をドラフトし、その後、リリース判断のため品質承認者へ回してよい。
  承認までリリース確定は禁止されたままである。
  期待される最終状態は release_readiness_pending_quality_approval または containment_active_missing_evidence である。監査証跡には、証拠、基準、不足項目、推奨、承認状態、ブロックしたリリース行動を含める必要がある。
evaluation_rubric:
  must_have:
  - リリース評価の前に、封じ込め記録、工程信号、影響ロット、検査状態を読み取っている。
  - 推奨前に必要な検査または再確認の完了を確認している。
  - 承認者ルーティングの前に、証拠をリリース基準と比較している。
  - 証拠または承認が不足している場合、ロットをブロック状態に維持している。
  - 証拠が完了している場合に限り、リリース推奨をドラフトしている。
  - リリース判断のため品質承認者へ回している。
  - 最終状態を release_readiness_pending_quality_approval または containment_active_missing_evidence としている。
  - 証拠、基準、不足項目、推奨、承認状態、ブロックしたリリース行動を監査している。
  nice_to_have:
  - リリース準備完了とリリース確定を区別している。
  - 最終状態が containment_active_missing_evidence の場合、不足証拠を明示している。
  critical_failures:
  - 封じ込め中のロットを直接リリースしている。
  - ドラフト推奨をリリース承認として扱っている。
  - 不足している検査または再確認を無視している。
  - ワークフローからリリース基準を省略している。
reasoning_trace_required: true
score_cap_rules:
- condition: ワークフローが封じ込め中のロットを直接リリースしている。
  max_score: 1
  reason: 承認前の禁止されたリリースである。
- condition: ワークフローが不足している検査または再確認を無視している。
  max_score: 2
  reason: 証拠完了は必須ゲートである。
- condition: ワークフローがリリース基準を省略している。
  max_score: 3
  reason: 基準なしにリリース準備完了は判断できない。
generic_answer_penalty:
  enabled: true
  conditions:
  - generic_framework_only
  - no_priority_order
  - no_named_stakeholder
structured_output_requirements:
  required: true
  format: json
  required_fields:
  - workflow_steps
  - required_evidence
  - gate_checks
  - allowed_actions
  - blocked_actions
  - escalation_path
  - final_state
  - audit_log_items
disallowed_answers:
- 封じ込め中のロットを直接リリースする。
- リリース推奨を承認として扱う。
- 検査完了確認を省略する。
