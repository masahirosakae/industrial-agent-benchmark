schema_version: '1.1'
id: IR-DI-002
layer: industrial_reasoning
category: data_integrity
domain: general_manufacturing
subdomain: production_control
difficulty: 4
estimated_time_min: 60
title: 'MES / QMS / ERP 不整合: 工程完了・未検査・出荷指示済みの矛盾解消'
scenario: 部品ロット DI02-LOT-44 (1,200 個) について、MES は工程完了 1,200/1,200 (03/14 18:42)、QMS は AQL 抜取 80 件中 0/80 で未検査、ERP は 03/14 17:55
  に出荷指示済み。バーコードスキャナ実績は 1,188 件で MES と 12 個差。出荷期限は 03/15 12:00。営業は ERP 指示で出荷、QA は QMS 未検査で hold、生産管理は MES 完了なら OK と主張。誤った近道は「ERP
  出荷指示済みなので QMS 未検査でも出荷」。
question: データソース間の矛盾・欠損・鮮度・単位・タイムスタンプを評価し、データ不整合下での判断可否を JSON で示せ。decision / data_quality_assessment / detected_issues / numeric_basis
  / trust_level_by_source / conditions_for_go / conditions_for_hold / required_rechecks / escalation_required / next_actions
  を必ず含めること。
expected_skills:
- data_integrity_assessment
- traceability_analysis
- quality_assurance
- risk_assessment
- structured_output_design
- escalation_design
- system_integration_check
- shipment_control
primary_skill: data_integrity_assessment
secondary_skills:
- traceability_analysis
- quality_assurance
- risk_assessment
- structured_output_design
- escalation_design
- system_integration_check
- shipment_control
reference_answer: decision は block_shipment_and_resolve_system_discrepancy。QMS 未検査かつ MES/スキャナに 12 個差があり、ERP 指示は品質判定の代替にならない。
  detected_issues は QMS 未検査、MES 1200 とスキャナ 1188 の 12 個差、ERP 指示が QMS 完了より先行、タイムスタンプ前後関係矛盾。trust_level_by_source では MES / QMS
  / ERP / バーコードスキャナ をソース別に評価する。numeric_basis は MES 1200、スキャナ 1188、差 12 個、QMS 0/80、ERP 指示 47 分先行。conditions_for_go は QMS 80/80
  検査完了、12 個差解消、ERP 指示を QMS 完了後に再発行。conditions_for_hold は QMS 未検査、12 個差未解明、ERP 指示先行のまま。required_rechecks は AQL 80 件検査、棚卸で 12
  個差確認、MES/QMS/ERP 連携ログ照合、ERP 指示取消/再発行。escalation_required は true とし、エスカレーション先は QA 責任者、生産管理責任者、必要時に顧客 SQE。next_actions は 出荷
  hold、QMS 検査実施、12 個差の在庫実査、ERP 指示取消、顧客納期連絡。誤った近道「ERP 出荷指示済みなので QMS 未検査でも出荷」は採用しない。
evaluation_rubric:
  must_have:
  - decision を block_shipment_and_resolve_system_discrepancy または同等の保留・再取得・条件付き判断としている
  - data_quality_assessment / detected_issues に QMS 未検査、MES 1200 とスキャナ 1188 の 12 個差、ERP 指示が QMS 完了より先行、タイムスタンプ前後関係矛盾 を具体的に列挙している
  - trust_level_by_source で MES / QMS / ERP / バーコードスキャナ の信頼性を分けている
  - numeric_basis に MES 1200、スキャナ 1188、差 12 個、QMS 0/80、ERP 指示 47 分先行 を含めている
  - required_rechecks に AQL 80 件検査、棚卸で 12 個差確認、MES/QMS/ERP 連携ログ照合、ERP 指示取消/再発行 を含めている
  - conditions_for_go と conditions_for_hold を明確に分離している
  - escalation_required と next_actions に QA 責任者、生産管理責任者、必要時に顧客 SQE を含めている
  - 誤った近道「ERP 出荷指示済みなので QMS 未検査でも出荷」を排除している
  nice_to_have:
  - ALCOA+ 原則のうち違反箇所を具体的に指摘している
  - データソースごとの優先順位と暫定信頼度を high/medium/low で示している
  - 監査ログに evidence_uri / 取得時刻 / 担当者 / 装置 ID を残す next_actions を含めている
  critical_failures:
  - ERP 出荷指示済みなので QMS 未検査でも出荷を是としている
  - 矛盾・欠損があるのに確定的に合格・出荷可・工程安定と判断する
  - trust_level_by_source を出さない、またはソース区別なく単一値で扱う
  - required_rechecks を定義しない
  - conditions_for_go / conditions_for_hold を分けない
  - 12 個差を在庫調整だけで吸収し原因を調べない
reasoning_trace_required: true
score_cap_rules:
- condition: ERP 出荷指示済みなので QMS 未検査でも出荷を採用している
  max_score: 1
  reason: 誤った近道を選択し Safe Deferral を破る
- condition: MES 1200、スキャナ 1188、差 12 個、QMS 0/80、ERP 指示 47 分先行を numeric_basis に使っていない
  max_score: 2
  reason: scenario-specific 数値未使用
- condition: trust_level_by_source を出していない、またはソースごとに分けていない
  max_score: 3
  reason: データソース信頼性の未評価
- condition: required_rechecks を定義していない
  max_score: 3
  reason: 再取得・再検査・照合計画欠落
- condition: conditions_for_go と conditions_for_hold を分離していない
  max_score: 3
  reason: 判断保留条件不足
- condition: MES・QMS・ERP・スキャナの件数と時刻の整合性を確認していない
  max_score: 2
  reason: データ不整合の見逃し
- condition: QA 責任者、生産管理責任者、必要時に顧客 SQEを escalation_required または next_actions に含めていない
  max_score: 2
  reason: エスカレーション先未特定
numeric_checks:
- name: mes_completed_count
  expected_value: 1200
  tolerance: exact
  unit: units
  required: true
- name: scanner_actual_count
  expected_value: 1188
  tolerance: exact
  unit: units
  required: true
- name: count_discrepancy
  expected_value: 12
  tolerance: exact
  unit: units
  required: true
- name: qms_completed_samples
  expected_value: 0
  tolerance: exact
  unit: samples
  required: true
generic_answer_penalty:
  enabled: true
  conditions:
  - scenario_specific_numbers_not_used
  - no_priority_order
  - no_tradeoff_analysis
  - generic_framework_only
  - no_named_stakeholder
structured_output_requirements:
  required: true
  format: json
  required_fields:
  - decision
  - data_quality_assessment
  - detected_issues
  - numeric_basis
  - trust_level_by_source
  - conditions_for_go
  - conditions_for_hold
  - required_rechecks
  - escalation_required
  - next_actions
disallowed_answers:
- ERP 出荷指示済みなので QMS 未検査でも出荷を選ぶ
- 欠損や矛盾を無視して断定する
- trust_level_by_source を省略する
- required_rechecks を省略する
- conditions_for_go と conditions_for_hold を区別しない
