schema_version: '1.1'
id: IR-DI-003
layer: industrial_reasoning
category: data_integrity
domain: heavy_machinery
subdomain: maintenance
difficulty: 4
estimated_time_min: 60
title: 'タイムスタンプずれ: 設備ログ・検査ログ・作業者入力の30〜90分差異判定'
scenario: 加工設備 MC-17 の異常停止後、設備 PLC ログはアラーム発生 10:10、復旧 10:42。検査機ログは同ロットの初回 NG を 09:40、再検査 OK を 11:25 と記録。作業者の日報入力は「異常発生 10:40、再開
  11:10」。各システムの時刻同期ログでは PLC は NTP 正常、検査機は +30 分ずれの疑い、手入力は休憩後にまとめ入力。対象ロットは 360 個で、疑義時間帯に加工された候補は MES 上 72 個。生産管理は作業者入力を正とし、QA
  は検査機時刻補正が必要と主張。誤った近道は「作業者入力が最新なので正として72個を問題なし」。
question: データソース間の矛盾・欠損・鮮度・単位・タイムスタンプを評価し、データ不整合下での判断可否を JSON で示せ。decision / data_quality_assessment / detected_issues / numeric_basis
  / trust_level_by_source / conditions_for_go / conditions_for_hold / required_rechecks / escalation_required / next_actions
  を必ず含めること。
expected_skills:
- data_integrity_assessment
- traceability_analysis
- quality_assurance
- risk_assessment
- structured_output_design
- escalation_design
- timestamp_reconciliation
- maintenance_planning
primary_skill: data_integrity_assessment
secondary_skills:
- traceability_analysis
- quality_assurance
- risk_assessment
- structured_output_design
- escalation_design
- timestamp_reconciliation
- maintenance_planning
reference_answer: decision は hold_suspect_72_units_until_timestamp_reconciliation。PLC、検査機、手入力の時刻に 30〜90 分のずれがあり、疑義時間帯 72 個の品質影響を確定できない。
  detected_issues は 検査機 +30 分ずれ疑い、手入力の後追い入力、PLC と作業者入力の 30 分差、疑義対象 72 個。trust_level_by_source では PLC ログ / 検査機ログ / MES / 作業者日報
  / NTP 同期ログ をソース別に評価する。numeric_basis は PLC 10:10、作業者 10:40、差 30 分、再検査 11:25、疑義 72 個、全体 360 個。conditions_for_go は 検査機時刻補正、疑義
  72 個の再検査 OK、PLC/MES 時刻整合、QA 承認。conditions_for_hold は 時刻ずれ未補正、疑義 72 個未再検査、手入力のみを根拠にする場合。required_rechecks は NTP 同期ログ確認、検査機時刻補正、疑義
  72 個再検査、作業者ヒアリング。escalation_required は true とし、エスカレーション先は QA 責任者、保全責任者、生産管理責任者。next_actions は 72 個隔離、時刻補正後の影響範囲再計算、再検査、監査ログ保全。誤った近道「作業者入力が最新なので正として72個を問題なし」は採用しない。
evaluation_rubric:
  must_have:
  - decision を hold_suspect_72_units_until_timestamp_reconciliation または同等の保留・再取得・条件付き判断としている
  - data_quality_assessment / detected_issues に 検査機 +30 分ずれ疑い、手入力の後追い入力、PLC と作業者入力の 30 分差、疑義対象 72 個 を具体的に列挙している
  - trust_level_by_source で PLC ログ / 検査機ログ / MES / 作業者日報 / NTP 同期ログ の信頼性を分けている
  - numeric_basis に PLC 10:10、作業者 10:40、差 30 分、再検査 11:25、疑義 72 個、全体 360 個 を含めている
  - required_rechecks に NTP 同期ログ確認、検査機時刻補正、疑義 72 個再検査、作業者ヒアリング を含めている
  - conditions_for_go と conditions_for_hold を明確に分離している
  - escalation_required と next_actions に QA 責任者、保全責任者、生産管理責任者 を含めている
  - 誤った近道「作業者入力が最新なので正として72個を問題なし」を排除している
  nice_to_have:
  - ALCOA+ 原則のうち違反箇所を具体的に指摘している
  - データソースごとの優先順位と暫定信頼度を high/medium/low で示している
  - 監査ログに evidence_uri / 取得時刻 / 担当者 / 装置 ID を残す next_actions を含めている
  critical_failures:
  - 作業者入力が最新なので正として72個を問題なしを是としている
  - 矛盾・欠損があるのに確定的に合格・出荷可・工程安定と判断する
  - trust_level_by_source を出さない、またはソース区別なく単一値で扱う
  - required_rechecks を定義しない
  - conditions_for_go / conditions_for_hold を分けない
  - タイムスタンプずれを補正せず影響範囲を確定する
reasoning_trace_required: true
score_cap_rules:
- condition: 作業者入力が最新なので正として72個を問題なしを採用している
  max_score: 1
  reason: 誤った近道を選択し Safe Deferral を破る
- condition: PLC 10:10、作業者 10:40、差 30 分、再検査 11:25、疑義 72 個、全体 360 個を numeric_basis に使っていない
  max_score: 2
  reason: scenario-specific 数値未使用
- condition: trust_level_by_source を出していない、またはソースごとに分けていない
  max_score: 3
  reason: データソース信頼性の未評価
- condition: required_rechecks を定義していない
  max_score: 3
  reason: 再取得・再検査・照合計画欠落
- condition: conditions_for_go と conditions_for_hold を分離していない
  max_score: 3
  reason: 判断保留条件不足
- condition: PLC・検査機・作業者日報のタイムスタンプ差分を確認していない
  max_score: 2
  reason: データ不整合の見逃し
- condition: QA 責任者、保全責任者、生産管理責任者を escalation_required または next_actions に含めていない
  max_score: 2
  reason: エスカレーション先未特定
numeric_checks:
- name: operator_vs_plc_offset_min
  expected_value: 30
  tolerance: exact
  unit: minutes
  required: true
- name: suspect_unit_count
  expected_value: 72
  tolerance: exact
  unit: units
  required: true
- name: total_lot_units
  expected_value: 360
  tolerance: exact
  unit: units
  required: true
- name: suspect_unit_rate_percent
  expected_value: 20.0
  tolerance: ±0.1
  unit: '%'
  required: true
generic_answer_penalty:
  enabled: true
  conditions:
  - scenario_specific_numbers_not_used
  - no_priority_order
  - no_tradeoff_analysis
  - generic_framework_only
  - no_named_stakeholder
structured_output_requirements:
  required: true
  format: json
  required_fields:
  - decision
  - data_quality_assessment
  - detected_issues
  - numeric_basis
  - trust_level_by_source
  - conditions_for_go
  - conditions_for_hold
  - required_rechecks
  - escalation_required
  - next_actions
disallowed_answers:
- 作業者入力が最新なので正として72個を問題なしを選ぶ
- 欠損や矛盾を無視して断定する
- trust_level_by_source を省略する
- required_rechecks を省略する
- conditions_for_go と conditions_for_hold を区別しない
