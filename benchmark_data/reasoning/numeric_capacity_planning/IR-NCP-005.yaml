schema_version: '1.1'
id: IR-NCP-005
layer: industrial_reasoning
category: numeric_capacity_planning
domain: automotive
subdomain: assembly
difficulty: 4
estimated_time_min: 35
title: Staffing Constraint Capacity
scenario: |
  A production cell needs two trained operators to run at 120 units per hour.
  With one trained operator, the same cell is limited to 70 units per hour.
  Only one trained operator is available for a 6-hour net shift today. Demand is 600 units today.
question: |
  Calculate today's feasible capacity and decide whether the schedule can be met without additional trained staffing.
  Identify the binding constraint and any needed escalation.
expected_skills:
- staffing_constraint_analysis
- capacity_calculation
- feasibility_judgement
- escalation_design
primary_skill: staffing_constraint_analysis
secondary_skills:
- capacity_calculation
- feasibility_judgement
- escalation_design
reference_answer: |
  The two-operator rate cannot be used because only one trained operator is available.
  Today's feasible rate is therefore 70 units per hour.
  Feasible capacity = 70 units/hour * 6 hours = 420 units.
  Demand is 600 units, so the plan is short by 180 units and cannot be met without additional trained staffing, approved overtime, demand rescheduling, or another approved capacity action.
  The binding constraint is trained staffing.
evaluation_rubric:
  must_have:
  - Uses the one-operator rate of 70 units per hour.
  - Calculates 420 units of feasible capacity.
  - Compares 420 units with 600 units of demand.
  - Concludes the schedule cannot be met without additional action.
  - Identifies trained staffing as the binding constraint.
  nice_to_have:
  - Calculates the 180-unit shortfall.
  - Mentions escalation for trained staffing, approved overtime, or rescheduling.
  critical_failures:
  - Uses the two-operator rate when only one trained operator is available.
  - Claims the plan is feasible without additional trained staffing or approved action.
  - Suggests using untrained labor to meet output without qualification or approval.
reasoning_trace_required: true
score_cap_rules:
- condition: Uses 120 units per hour as the feasible rate.
  max_score: 1
  reason: The answer ignores the staffing constraint.
- condition: Recommends untrained staffing without qualification or approval.
  max_score: 1
  reason: Unsafe staffing escalation.
numeric_checks:
- name: feasible_capacity
  expected_value: 420
  tolerance: exact
  unit: units
  required: true
- name: shortfall
  expected_value: 180
  tolerance: exact
  unit: units
  required: true
- name: feasibility
  expected_value: infeasible
  tolerance: exact
  unit: decision
  required: true
generic_answer_penalty:
  enabled: true
  conditions:
  - scenario_specific_numbers_not_used
  - generic_framework_only
  - no_named_stakeholder
disallowed_answers:
- Use the two-operator rate of 120 units per hour.
- The schedule can be met with one trained operator.
- Add untrained labor to meet the plan without qualification.
