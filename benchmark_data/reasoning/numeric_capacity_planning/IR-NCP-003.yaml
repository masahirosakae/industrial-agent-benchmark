schema_version: '1.1'
id: IR-NCP-003
layer: industrial_reasoning
category: numeric_capacity_planning
domain: general_manufacturing
subdomain: assembly
difficulty: 3
estimated_time_min: 25
title: 歩留まりを考慮した投入数量
scenario: |
  最終組立は1日あたり良品960台を納入しなければならない。初回通過歩留まりは92%と見込まれている。
  不合格品はスクラップとなり、再作業できない。
question: |
  良品960台を期待するには、何台の組立を開始する必要があるか。
  丸め規則と、それが必要な理由を説明せよ。
expected_skills:
- yield_adjusted_capacity
- integer_rounding
- unit_conversion
- numeric_result_explanation
primary_skill: yield_adjusted_capacity
secondary_skills:
- integer_rounding
- unit_conversion
- numeric_result_explanation
reference_answer: |
  必要投入数は歩留まりを考慮する必要がある。良品になると期待されるのは92%だけだからである。
  必要投入数 = 良品960台 / 0.92 = 1043.48台である。
  部分的な組立は開始できないため、結果は1044台に切り上げなければならない。
  1043台に切り下げると、期待値として良品960台を確保できない。
evaluation_rubric:
  must_have:
  - 960に0.92を掛けるのではなく、960を0.92で割っている。
  - 必要投入数を約1043.48台と計算している。
  - 1044台に切り上げている。
  - 小数の組立は不可能であり、歩留まりが投入数量を決めることを説明している。
  nice_to_have:
  - これは期待値に基づく計画であり、保証ではないと述べている。
  - 歩留まりリスクには監視または代替策が必要になり得ると述べている。
  critical_failures:
  - 960に0.92を掛けて必要投入数を減らしている。
  - 1043台に切り下げている。
  - スクラップまたは歩留まりを無視し、960台の投入で十分としている。
reasoning_trace_required: true
score_cap_rules:
- condition: 必要投入数を切り下げている。
  max_score: 1
  reason: 切り下げると期待投入数が不足する。
- condition: 歩留まりを逆方向に適用している。
  max_score: 1
  reason: 中心となる計算が逆になっている。
numeric_checks:
- name: required_starts_unrounded
  expected_value: 1043.48
  tolerance: +/-0.1
  unit: assemblies
  required: true
- name: required_starts_rounded
  expected_value: 1044
  tolerance: exact
  unit: assemblies
  required: true
generic_answer_penalty:
  enabled: true
  conditions:
  - scenario_specific_numbers_not_used
  - generic_framework_only
disallowed_answers:
- 1043台の組立を開始する。
- 要求は良品960台なので、960台の組立を開始する。
- 必要投入数は883台または884台である。
