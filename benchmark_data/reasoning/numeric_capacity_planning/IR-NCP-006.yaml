schema_version: '1.1'
id: IR-NCP-006
layer: industrial_reasoning
category: numeric_capacity_planning
domain: general_manufacturing
subdomain: machining
difficulty: 4
estimated_time_min: 35
title: 必要機械台数
scenario: |
  マシニングセンタのサイクルタイムは1台あたり45秒である。
  1日2直で稼働し、各直の正味生産時間は7時間である。
  日次需要は1,200台である。
question: |
  1台の機械の日次能力を計算し、同一機械が何台必要かを判断せよ。
  丸め規則を説明せよ。
expected_skills:
- equipment_capacity_calculation
- unit_conversion
- integer_rounding
- feasibility_judgement
primary_skill: equipment_capacity_calculation
secondary_skills:
- unit_conversion
- integer_rounding
- feasibility_judgement
reference_answer: |
  1台の機械には 2 * 7 = 14時間/日の正味生産時間がある。
  秒に換算すると、14 * 3600 = 50,400秒/日である。
  1台あたりの能力 = 50,400 / 45 = 1,120台/日である。
  必要機械台数 = 1,200 / 1,120 = 1.071台である。
  部分的な機械は利用できないため、2台に切り上げなければならない。
evaluation_rubric:
  must_have:
  - 正味14時間を50,400秒に換算している。
  - 1台あたりの能力を1日あたり1,120台と計算している。
  - 需要1,200台を能力1,120台で割っている。
  - 1.071台から2台へ切り上げている。
  - 部分的な機械では要求を満たせないことを説明している。
  nice_to_have:
  - 1台では1日あたり80台不足すると指摘している。
  - 2台目はフル活用されない可能性があるが、与えられた制約下では必要であると述べている。
  critical_failures:
  - 実行可能な計画として1.071台を報告している。
  - 1台に切り下げている。
  - 45秒のサイクルタイムを使う前に時間を秒へ換算していない。
reasoning_trace_required: true
score_cap_rules:
- condition: 必要機械台数を1台に切り下げている。
  max_score: 1
  reason: 設備台数は切り上げる必要がある。
- condition: 秒/台のサイクルタイムに対して、時間を秒に換算していない。
  max_score: 3
  reason: 単位換算が必要である。
numeric_checks:
- name: one_machine_capacity
  expected_value: 1120
  tolerance: exact
  unit: units_per_day
  required: true
- name: required_machines_unrounded
  expected_value: 1.071
  tolerance: +/-0.01
  unit: machines
  required: true
- name: required_machines_rounded
  expected_value: 2
  tolerance: exact
  unit: machines
  required: true
generic_answer_penalty:
  enabled: true
  conditions:
  - scenario_specific_numbers_not_used
  - generic_framework_only
disallowed_answers:
- 1台で十分である。
- 最終的な実行可能回答として1.071台が必要である。
