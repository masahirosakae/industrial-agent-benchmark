schema_version: '1.1'
id: IR-NCP-010
layer: industrial_reasoning
category: numeric_capacity_planning
domain: general_manufacturing
subdomain: production_control
difficulty: 5
estimated_time_min: 45
title: 歩留まりと品質境界を考慮した特急対応能力
scenario: |
  特急依頼では2日間で良品1,600台が必要である。
  工程には2台の機械があり、品質低下が生じる前の能力は各機械1日あたり500投入である。
  その能力を超えて稼働するとスクラップリスクが増加し、品質承認が必要である。通常歩留まりは96%である。
  追加機械は利用できない。
question: |
  通常の機械制限を超えずにこの依頼が実現可能か評価せよ。
  必要投入数を計算し、利用可能な投入能力と比較し、エスカレーション判断を述べよ。
expected_skills:
- yield_adjusted_capacity
- equipment_capacity_calculation
- feasibility_judgement
- constraint_handling
- escalation_design
primary_skill: yield_adjusted_capacity
secondary_skills:
- equipment_capacity_calculation
- feasibility_judgement
- constraint_handling
- escalation_design
reference_answer: |
  必要投入数は歩留まりを考慮する必要がある。良品1,600台 / 0.96 = 1,666.67投入であるため、少なくとも1,667投入が必要である。
  通常投入能力は 2台の機械 * 500投入/日 * 2日 = 2,000投入である。
  通常投入2,000は必要投入1,667を上回るため、材料、要員、その他の制約が利用可能であるという前提では、通常の機械制限を超えずに依頼は能力上実現可能である。
  通常の機械制限で十分であるため、能力面では定格超過に対する品質エスカレーションは不要である。ただし、前提条件は確認すべきであり、別の制約が発生して品質承認を得る場合を除き、定格超過稼働を推奨してはならない。
evaluation_rubric:
  must_have:
  - 良品需要と96%歩留まりから必要投入数を計算している。
  - 必要投入数を1,667に切り上げている。
  - 通常の2日間機械能力を2,000投入と計算している。
  - 通常の機械制限内で依頼は能力上実現可能と結論づけている。
  - 能力面では定格超過の品質エスカレーションは不要だが、材料や要員などの前提は確認すべきだと述べている。
  nice_to_have:
  - 良品台数を投入能力と直接比較するだけでは不十分な理由を説明している。
  - 残る前提条件を特定し、不要な残業または品質リスクを避けている。
  critical_failures:
  - 歩留まりを考慮せず、良品1,600台を投入能力と直接比較している。
  - 通常能力で十分であるにもかかわらず、定格超過生産を推奨している。
  - 必要投入数を切り上げていない。
  - 2台の機械による2日間能力を無視し、依頼は実現不可能と主張している。
reasoning_trace_required: true
score_cap_rules:
- condition: 必要投入数が歩留まりで調整されていない。
  max_score: 2
  reason: 歩留まり調整後の投入数が判断の中心である。
- condition: 必要性または品質承認なしに定格超過生産を推奨している。
  max_score: 1
  reason: 不要な品質リスクを生じさせる。
- condition: 必要投入数を切り下げている。
  max_score: 1
  reason: 投入数には整数への切り上げが必要である。
numeric_checks:
- name: required_starts_unrounded
  expected_value: 1666.67
  tolerance: +/-0.1
  unit: starts
  required: true
- name: required_starts_rounded
  expected_value: 1667
  tolerance: exact
  unit: starts
  required: true
- name: normal_start_capacity
  expected_value: 2000
  tolerance: exact
  unit: starts
  required: true
- name: feasibility
  expected_value: feasible
  tolerance: exact
  unit: decision
  required: true
generic_answer_penalty:
  enabled: true
  conditions:
  - scenario_specific_numbers_not_used
  - generic_framework_only
  - no_tradeoff_analysis
disallowed_answers:
- 品質承認なしに通常の機械制限を超えて稼働する。
- 利用可能なのは1000投入だけなので、この依頼は実現不可能である。
- 需要が良品1600台なので、必要投入数は1600である。
