id: IK-IMPR-001
layer: industrial_knowledge
category: improvement
domain: general_manufacturing
subdomain: machining
difficulty: 4
estimated_time_min: 45
title: 段取り時間短縮の改善テーマ選定
scenario: |
  ある加工セルでは段取り替えに55分かかっている。
  観察された内訳は、治具の取り外しと取り付けが25分、工具オフセット確認が15分、初品検査が10分、書類作業が5分である。
  このセルでは年間4,000回の段取り替えがあり、生産ロス1分の価値は120円である。
  チームは、段取り時間を40分短縮できる可能性がある治具プリセットカートを検討している。
  カートの費用は800,000円、年間保守費は100,000円であり、導入後最初の8週間は段取り替え1回あたり作業者2名が20分必要である。
question: |
  どの改善テーマを選定すべきか。また、どの基本的な費用対効果確認を行うべきか。
  40分の段取り短縮が、さらなる実施計画を正当化するのに十分かを説明せよ。
expected_skills:
- quality_improvement
- shopfloor_control
- cost_benefit_analysis
- production_planning
primary_skill: quality_improvement
secondary_skills:
- shopfloor_control
- cost_benefit_analysis
- production_planning
reference_answer: |
  治具交換、オフセット確認、初品確認が最大のロスであるため、治具プリセットと段取り標準化のテーマが適切である。
  40分の短縮を4,000回の段取り替えに適用すると、年間160,000分を削減できる。1分あたり120円では、年間総便益は19,200,000円である。
  800,000円の購入費と100,000円の年間保守費を考慮しても、期待便益は実施計画を正当化するのに十分大きい。
  ただし、本格展開前に、導入後最初の8週間の追加作業工数、作業者教育、治具精度、初品品質リスク、短縮効果の再現性を確認する必要がある。
evaluation_rubric:
  must_have:
  - 段取り時間短縮を改善テーマとして認識している。
  - 40分に4,000回の段取り替えを掛けて、年間時間削減を計算している。
  - 期待便益を購入費および保守費と比較している。
  nice_to_have:
  - 初品品質、教育、再現性確認を指摘している。
  - 段階的導入またはパイロット確認に言及している。
  critical_failures:
  - 40分短縮を検証なしに自動承認されたものとして扱っている。
  - 費用、品質、または実施上の制約を無視している。
reasoning_trace_required: true
