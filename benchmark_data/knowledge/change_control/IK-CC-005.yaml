schema_version: '1.1'
id: IK-CC-005
layer: industrial_knowledge
category: change_control
domain: general_manufacturing
subdomain: assembly
difficulty: 3
estimated_time_min: 30
title: 実施管理と適用日
scenario: |
  工程変更は承認済みだが、一部の作業標準とライン表示にはまだ旧改訂が表示されている。
question: |
  生産ラインで実施する前に、どのような管理が必要か。
expected_skills:
- change_control
- implementation_control
- documentation_control
- training_control
primary_skill: implementation_control
secondary_skills:
- change_control
- documentation_control
- training_control
reference_answer: |
  実施前に、チームは承認済みの適用日または実施時点を確認する必要がある。
  管理文書は使用前に更新およびリリースされなければならず、旧作業標準は使用場所で撤去、使用停止、または廃止表示される必要がある。
  影響を受ける作業者には連絡または教育を行い、ライン表示、段取り表、関連記録が新改訂と一致していることを確認する。
  実施完了の証拠を保持する必要がある。
evaluation_rubric:
  must_have:
  - 承認済みの適用日または実施時点を確認している。
  - 使用前に管理文書を更新しリリースしている。
  - 使用場所で旧作業標準を撤去、使用停止、または廃止している。
  - 影響を受ける作業者へ連絡または教育を行っている。
  - ライン表示、段取り表、または関連記録が新改訂と一致していることを確認している。
  - 実施完了の証拠を保持している。
  nice_to_have:
  - 承認と管理された実施を区別している。
  - 改訂混在生産の防止に言及している。
  critical_failures:
  - 旧作業標準と新作業標準が混在した状態で生産を許可している。
  - 使用場所の文書が更新されていないにもかかわらず、承認だけで十分としている。
  - 適用日または実施境界を省略している。
reasoning_trace_required: false
score_cap_rules:
- condition: 回答が旧作業標準と新作業標準が混在した状態での実施を認めている。
  max_score: 1
  reason: 改訂混在での使用は重大な実施管理不良である。
- condition: 回答が適用日または実施境界を省略している。
  max_score: 3
  reason: 適用日管理は実施管理の中核である。
generic_answer_penalty:
  enabled: true
  conditions:
  - generic_framework_only
disallowed_answers:
- 承認は完了しているので、旧作業標準のまま生産を行う。
- ライン切替後に文書を更新する。
