schema_version: '1.1'
id: IK-CC-007
layer: industrial_knowledge
category: change_control
domain: automotive
subdomain: quality_assurance
difficulty: 4
estimated_time_min: 40
title: 改訂間の文書管理
scenario: |
  承認済みの設計変更により、図面、管理計画、作業標準、検査チェックリストが更新される。
question: |
  改訂混在生産を防止するために、どのような文書管理上の対応が必要か。
expected_skills:
- change_control
- documentation_control
- revision_control
- implementation_control
primary_skill: documentation_control
secondary_skills:
- change_control
- revision_control
- implementation_control
reference_answer: |
  新しい管理改訂は、一括で、または定義された適用順序に従ってリリースする必要がある。
  旧改訂は使用場所で撤去、使用停止、または廃止扱いにする必要がある。
  図面、管理計画、作業標準、検査チェックリストの改訂を整合させなければならない。
  適用日またはロット/シリアル境界を周知し、改訂履歴と承認記録を保持し、生産では現在リリース済みの文書だけが使用されていることを確認する。
evaluation_rubric:
  must_have:
  - 新しい管理改訂を一括で、または定義された適用順序に従ってリリースしている。
  - 使用場所で旧改訂を撤去、使用停止、または廃止している。
  - 図面、管理計画、作業標準、検査チェックリストの改訂を整合させている。
  - 適用日またはロット/シリアル境界を周知している。
  - 改訂履歴と承認記録を保持している。
  - 生産で現在リリース済みの文書だけが使用されていることを確認している。
  nice_to_have:
  - 改訂混在生産の防止に言及している。
  - 使用場所での管理を中央文書リリースとは別の管理として特定している。
  critical_failures:
  - 関連する管理文書が旧版のままなのに、1つの文書更新だけで十分としている。
  - 適用境界なしに旧改訂と新改訂を併用することを認めている。
  - 使用場所にある旧版文書の撤去または使用停止を省略している。
reasoning_trace_required: false
score_cap_rules:
- condition: 回答が1つの文書更新だけで十分としている。
  max_score: 1
  reason: この項目は管理文書リリースの整合性を評価する。
- condition: 回答が旧改訂の撤去または使用停止を省略している。
  max_score: 3
  reason: 使用場所にある廃止文書の防止が中核である。
generic_answer_penalty:
  enabled: true
  conditions:
  - generic_framework_only
disallowed_answers:
- 図面を更新すれば十分である。
- 旧作業標準と新作業標準を両方利用可能にし、作業者に選ばせる。
